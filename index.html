<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domine Sua Mente | @imperador.de.si</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Cinzel', 'serif'],
                    },
                    colors: {
                        stoic: {
                            900: '#0a0a0c',
                            800: '#141417',
                            700: '#232328',
                            gold: '#d4af37',
                            goldhover: '#f1c94b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0c;
            color: #e5e7eb;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1f 0%, #0a0a0c 70%);
        }
        .glow-btn {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }
        .link-card {
            transition: all 0.3s ease;
        }
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.25);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- Efeito visual de fundo escurecido -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[500px] bg-stoic-gold opacity-[0.02] blur-[120px] rounded-full pointer-events-none"></div>

    <main class="w-full max-w-md mx-auto relative z-10">

		<!-- Novo Botão 2: Anatomia da Ansiedade Moderna -->
		<a href="https://anatomiadaansiedademoderna.netlify.app/" target="_blank" rel="noopener noreferrer" class="link-card block w-full bg-stoic-800 border border-stoic-700 text-neutral-300 hover:text-white hover:border-stoic-gold py-4 px-6 rounded-md text-center text-sm tracking-wide flex items-center justify-center gap-3">
    <i data-lucide="link" class="w-5 h-5 text-stoic-gold"></i>
    <span>Manual: A Anatomia da Ansiedade Moderna</span>
		</a>

		<!-- Novo Botão 3: Biblioteca Estoica: Grandes Mestres -->
		<a href="https://amzn.to/4edmwlJ" target="_blank" rel="noopener noreferrer" class="link-card block w-full bg-stoic-800 border border-stoic-700 text-neutral-300 hover:text-white hover:border-stoic-gold py-4 px-6 rounded-md text-center text-sm tracking-wide flex items-center justify-center gap-3">
    <i data-lucide="link" class="w-5 h-5 text-stoic-gold"></i>

		</a>

		<a href="https://amzn.to/41WpxiT" target="_blank" rel="noopener noreferrer" class="link-card block w-full bg-stoic-800 border border-stoic-700 text-neutral-300 hover:text-white hover:border-stoic-gold py-4 px-6 rounded-md text-center text-sm tracking-wide flex items-center justify-center gap-3">
    <i data-lucide="link" class="w-5 h-5 text-stoic-gold"></i>
    <span>Livro: 365 Reflexões Estoicas</span>
		</a>
